services:
  sglang-worker:
    image: runpod/worker-sglang:dev
    pull_policy: never

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - HOST=0.0.0.0
      - PORT=30000
      - MODEL_NAME=Qwen/Qwen3-VL-8B-Instruct-FP8
      # Do NOT set QUANTIZATION for pre-quantized FP8 models - sglang auto-detects
      - TRUST_REMOTE_CODE=true
      - DTYPE=auto
      - ATTENTION_BACKEND=flashinfer
      - SAMPLING_BACKEND=flashinfer
      - FILE_STORAGE_PATH=/runpod-volume/file-storage
      - HF_TOKEN=${HF_TOKEN}
      # VLM optimization env vars
      - SGLANG_VLM_CACHE_SIZE_MB=0

      # Memory & concurrency tuning for 10 concurrent users on RTX 4090 (24GB)
      - MEM_FRACTION_STATIC=0.85
      - MAX_RUNNING_REQUESTS=10
      - MAX_TOTAL_TOKENS=8192
      - CHUNKED_PREFILL_SIZE=512
      - MAX_PREFILL_TOKENS=4096
      - CONTEXT_LENGTH=8192
      - MAX_CONCURRENCY=10

      # VLM-optimized scheduling
      - SCHEDULE_POLICY=lpm
      - LOG_LEVEL=info

      # Optional: Uncomment if you want thinking/reasoning parsed separately
      # - REASONING_PARSER=qwen3

    ports:
      - "8000:8000"

    volumes:
      - ../var/runpod-volume:/runpod-volume